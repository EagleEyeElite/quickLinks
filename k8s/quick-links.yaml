apiVersion: apps/v1
kind: Deployment
metadata:
  name: quick-links
  labels:
    app: quick-links
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quick-links
  template:
    metadata:
      labels:
        app: quick-links
    spec:
      tolerations:
        - key: "workload-type"
          operator: "Equal"
          value: "untrusted"
          effect: "NoSchedule"
        # replicas:1 pinned to k3s-apps-vm → this pod can only ever run on that
        # one node. The default 300s not-ready/unreachable tolerations then hurt:
        # on a node reboot (nightly autoUpgrade / longer outage) k8s evicts the
        # pod and makes a replacement that CAN'T schedule elsewhere, leaving the
        # original as an uncollected "Error" pod corpse. Ride out node blips (6h)
        # and let the container restart in place instead.
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 21600
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 21600
      nodeSelector:
        kubernetes.io/hostname: k3s-apps-vm
      containers:
        - name: app
          image: registry.k8s.gated.conrad-klaus.de/quick-links:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_HOST
              value: db
          envFrom:
            - secretRef:
                name: quicklinks-postgres
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: quick-links
spec:
  type: ClusterIP
  selector:
    app: quick-links
  ports:
    - port: 80
      targetPort: 8080
---
# Per-client rate limit for the public goto/qr endpoints. There was previously
# NO rate limiting anywhere (not at Cloudflare, not in Traefik, not in-app), so
# nothing throttled path enumeration. Secret links are unguessable on entropy
# alone (128-bit), but this caps probing as defense-in-depth — the same pattern
# hanna uses for its /i/ invite route.
#
# Buckets by the REAL client IP: all origin traffic arrives from Cloudflare edge
# IPs (enforced by the cloudflare-only middleware), so without sourceCriterion
# Traefik would see every request as coming from ~the same handful of CF IPs and
# rate-limit all users as one global bucket. Cf-Connecting-IP carries the true
# client IP and is trustworthy here precisely because cloudflare-only guarantees
# the request came through Cloudflare.
#
# average/burst = a sustained 10 req/s with bursts to 20 per client — generous
# for real humans clicking links, punishing for an enumerator.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: quicklinks-ratelimit
spec:
  rateLimit:
    average: 10
    burst: 20
    period: 1s
    sourceCriterion:
      requestHeaderName: Cf-Connecting-IP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quick-links
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
    # Opt into the public entrypoints. Without this annotation Traefik's
    # deny-by-default config (k3s HelmChartConfig in personal-infrastructure
    # src/self-hosted/k8s.ts) would attach this router only to websecure-ts,
    # making the goto.*/qr.* short-link service Tailscale-only. The web
    # entrypoint picks up port-80 requests and redirects via the
    # entrypoint-level redirectTo, so clients typing `goto.conrad-klaus.de`
    # without https:// still land on HTTPS.
    traefik.ingress.kubernetes.io/router.entrypoints: "web,websecure"
    # cloudflare-only WAF allowlist. Required since 2026-06-26: it moved off
    # the Traefik websecure entrypoint default to a per-public-router
    # middleware (so the unlisted hanna.hidden host could opt out — Traefik
    # can't exempt one router from an entrypoint middleware). Without this,
    # goto.*/qr.* are reachable directly on the WAN IP, bypassing the
    # Cloudflare WAF. Middleware lives in kube-system (personal-infrastructure).
    # Apply this manifest BEFORE `pulumi up` removes the entrypoint default.
    #
    # Chained in order: cloudflare-only (drop non-Cloudflare origin traffic)
    # THEN quicklinks-ratelimit (throttle per real client IP). The rate-limit
    # Middleware is defined in THIS file, in the same (default) namespace as this
    # Ingress — hence the `default-` prefix. Keep it in sync if these manifests
    # are ever applied into a different namespace.
    traefik.ingress.kubernetes.io/router.middlewares: kube-system-cloudflare-only@kubernetescrd,default-quicklinks-ratelimit@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - goto.conrad-klaus.de
      secretName: goto-tls
    - hosts:
        - qr.conrad-klaus.de
      secretName: qr-tls
  rules:
    # Public access — both `goto.*` and `qr.*` aliases route to the same app
    - host: goto.conrad-klaus.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quick-links
                port:
                  number: 80
    - host: qr.conrad-klaus.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quick-links
                port:
                  number: 80
