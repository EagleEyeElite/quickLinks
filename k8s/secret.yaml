apiVersion: v1
kind: Secret
metadata:
  name: quicklinks-postgres
type: Opaque
stringData:
  POSTGRES_DB: quick_links
  POSTGRES_USER: user
  POSTGRES_PASSWORD: ybjwxzwuulkwoomxr
  PGADMIN_DEFAULT_EMAIL: admin@example.com
  PGADMIN_DEFAULT_PASSWORD: admin
  # PGADMIN_OIDC_SECRET is NOT here anymore — it lives in a separate Secret
  # named `pgadmin-oidc` managed by personal-infrastructure's Pulumi stack
  # (src/self-hosted/k8s.ts), sourced from `pgadmin:oidcClientSecret` in
  # Pulumi config. The Deployment in pgadmin.yaml references that Secret
  # directly. Keeping the OIDC client secret here as a placeholder caused
  # a silent failure in 2026-04: `kubectl apply` installed the literal
  # string "PLACEHOLDER_WILL_BE_SET_AT_DEPLOY" and Authelia rejected every
  # OIDC token exchange with "invalid_client".
