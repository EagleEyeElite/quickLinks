---
# init_db.sql as a ConfigMap so postgres can use it
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init
data:
  # Keep in sync with db/init_db.sql. Rows are keyed by sha256(path) so a DB or
  # backup leak cannot recover working secret links; the app hashes the incoming
  # path before looking it up. redirect_url is TEXT so long destinations aren't
  # truncated; label is an optional non-secret note for admins.
  # NOTE: this ConfigMap only seeds an EMPTY database (postgres runs
  # docker-entrypoint-initdb.d scripts on first init).
  init_db.sql: |
    CREATE TABLE redirects (
        path_hash    CHAR(64) PRIMARY KEY,
        redirect_url TEXT NOT NULL,
        label        VARCHAR(255)
    );

    -- sha256('home') and sha256('test') — sample vanity links (not secret).
    INSERT INTO redirects (path_hash, redirect_url, label) VALUES
      ('4ea140588150773ce3aace786aeef7f4049ce100fa649c94fbbddb960f1da942', 'https://example.com', 'home'),
      ('9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08', 'https://test.com',    'test');
---
# Persistent storage for postgres data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  labels:
    app: db
spec:
  replicas: 1
  strategy:
    type: Recreate  # PVC is RWO; can't have two pods running at once
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      # Runs on the untrusted apps VM alongside the quick-links frontend so the
      # Postgres data volume sits behind the same trust boundary as the pods
      # that read it. The k3s LXC is reserved for privileged workloads.
      tolerations:
        - key: "workload-type"
          operator: "Equal"
          value: "untrusted"
          effect: "NoSchedule"
      nodeSelector:
        kubernetes.io/hostname: k3s-apps-vm
      containers:
        - name: postgres
          image: postgres:13
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: quicklinks-postgres
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: "20m"
              memory: "64Mi"
            limits:
              memory: "256Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: db-data
        - name: init
          configMap:
            name: db-init
---
# ClusterIP service — never exposed via Ingress (private to cluster)
apiVersion: v1
kind: Service
metadata:
  name: db
spec:
  type: ClusterIP
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
