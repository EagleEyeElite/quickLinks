---
# pgAdmin entrypoint + self-heal script as ConfigMap.
#
# entrypoint.sh    — creates pgpass + servers.json from env vars, launches
#                    oidc_cleanup.py in the background, then execs the upstream
#                    pgAdmin entrypoint.
#
# oidc_cleanup.py  — makes this instance OIDC-only and keeps every OAuth user's
#                    server tree populated.
#
#   Why it exists:
#     * The dpage/pgadmin4 image requires PGADMIN_DEFAULT_EMAIL/PASSWORD and
#       always creates an internal "bootstrap" admin on first boot — even in
#       OAuth setups. AUTHENTICATION_SOURCES=['oauth2'] hides the internal
#       login form, so that user can't log in, but the row stays in the
#       sqlite `user` table as a stale record. We want it gone.
#     * servers.json is auto-imported *only for the first user created in
#       the container*. That's always the internal bootstrap user, never the
#       OAuth user. So OAuth users see an empty tree unless we insert a
#       server row for them after they first log in.
#
#   On every tick (60s):
#     1. No-ops until at least one oauth2 user has logged in. This guard
#        protects a fresh cluster: we never wipe the internal admin before
#        the operator has had a chance to open Authelia once.
#     2. Deletes every row where auth_source='internal' along with its
#        server / servergroup / roles_users rows.
#     3. For each OAuth user missing a servergroup+server, inserts a
#        "Servers" group and a "Primary Database" entry pointing at the
#        same host/port/db/username the servers.json block uses. Password
#        resolution is delegated to /root/.pgpass so rotating the DB
#        password only requires updating the Secret, not the sqlite DB.
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgadmin-entrypoint
data:
  oidc_cleanup.py: |
    import sqlite3, time, json, os, traceback
    DB_PATH = '/var/lib/pgadmin/pgadmin4.db'
    PG_HOST = os.environ['POSTGRES_HOST']
    PG_DB   = os.environ['POSTGRES_DB']
    PG_USER = os.environ['POSTGRES_USER']
    CONN_PARAMS = json.dumps({'sslmode': 'prefer', 'passfile': '/root/.pgpass'})
    while True:
        try:
            if os.path.exists(DB_PATH):
                c = sqlite3.connect(DB_PATH)
                oauth = c.execute(
                    "SELECT id, email FROM user WHERE auth_source != 'internal'"
                ).fetchall()
                if oauth:
                    internal_ids = [r[0] for r in c.execute(
                        "SELECT id FROM user WHERE auth_source = 'internal'"
                    )]
                    for uid in internal_ids:
                        for tbl in ('server', 'servergroup', 'roles_users'):
                            c.execute(f'DELETE FROM {tbl} WHERE user_id = ?', (uid,))
                        c.execute('DELETE FROM user WHERE id = ?', (uid,))
                    for uid, _email in oauth:
                        if not c.execute(
                            'SELECT 1 FROM servergroup WHERE user_id = ?', (uid,)
                        ).fetchone():
                            c.execute(
                                "INSERT INTO servergroup (user_id, name) "
                                "VALUES (?, 'Servers')", (uid,))
                        if not c.execute(
                            'SELECT 1 FROM server WHERE user_id = ?', (uid,)
                        ).fetchone():
                            sg = c.execute(
                                'SELECT id FROM servergroup WHERE user_id = ?',
                                (uid,)).fetchone()[0]
                            c.execute(
                                'INSERT INTO server (user_id, servergroup_id, '
                                'name, host, port, maintenance_db, username, '
                                'connection_params) VALUES '
                                "(?, ?, 'Primary Database', ?, 5432, ?, ?, ?)",
                                (uid, sg, PG_HOST, PG_DB, PG_USER, CONN_PARAMS))
                    c.commit()
                c.close()
        except Exception:
            traceback.print_exc()
        time.sleep(60)
  entrypoint.sh: |
    #!/bin/sh
    export PGADMIN_CONFIG_SERVER_MODE=True
    export PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=True

    # OAuth2 via Authelia (OIDC). pgAdmin reads PGADMIN_CONFIG_* as Python literals.
    # OAUTH2_CLIENT_SECRET comes from the PGADMIN_OIDC_SECRET env var (set via k8s Secret).
    #
    # OAUTH2_API_BASE_URL is mandatory — pgAdmin's oauth2.py does a plain
    # dict[] lookup on it (not .get()), so omitting it surfaces as a Python
    # KeyError that reaches the login handler as
    # `{"errormsg": "'OAUTH2_API_BASE_URL'"}` and the SSO flow never starts.
    # OAUTH2_USERINFO_ENDPOINT is resolved relative to this base.
    export PGADMIN_CONFIG_AUTHENTICATION_SOURCES="['oauth2']"
    export PGADMIN_CONFIG_OAUTH2_AUTO_CREATE_USER=True
    # Traefik terminates TLS and forwards as HTTP — have Flask honour
    # X-Forwarded-* so the OAuth2 redirect_uri is built with the public
    # https://pgadmin.ts.conrad-klaus.de host instead of the in-cluster one.
    export PGADMIN_CONFIG_PROXY_X_HOST_COUNT=1
    export PGADMIN_CONFIG_PROXY_X_PROTO_COUNT=1
    export PGADMIN_CONFIG_PROXY_X_FOR_COUNT=1
    export PGADMIN_CONFIG_PROXY_X_PORT_COUNT=1
    export PGADMIN_CONFIG_PROXY_X_PREFIX_COUNT=0
    export PGADMIN_CONFIG_OAUTH2_CONFIG="[{ \
      'OAUTH2_NAME': 'authelia', \
      'OAUTH2_DISPLAY_NAME': 'Authelia', \
      'OAUTH2_CLIENT_ID': 'pgadmin', \
      'OAUTH2_CLIENT_SECRET': '${PGADMIN_OIDC_SECRET}', \
      'OAUTH2_TOKEN_URL': 'https://auth.ts.conrad-klaus.de/api/oidc/token', \
      'OAUTH2_AUTHORIZATION_URL': 'https://auth.ts.conrad-klaus.de/api/oidc/authorization', \
      'OAUTH2_API_BASE_URL': 'https://auth.ts.conrad-klaus.de/api/oidc/', \
      'OAUTH2_SERVER_METADATA_URL': 'https://auth.ts.conrad-klaus.de/.well-known/openid-configuration', \
      'OAUTH2_USERINFO_ENDPOINT': 'userinfo', \
      'OAUTH2_SCOPE': 'openid profile email', \
      'OAUTH2_ICON': 'fa-openid', \
      'OAUTH2_BUTTON_COLOR': '#4051b5', \
    }]"

    SERVERS_JSON_PATH="/pgadmin4/servers.json"
    PGPASSFILE="$HOME/.pgpass"

    echo "${POSTGRES_HOST}:*:*:${POSTGRES_USER}:${POSTGRES_PASSWORD}" > "$PGPASSFILE"
    chmod 600 $PGPASSFILE

    cat << EOF > $SERVERS_JSON_PATH
    {
        "Servers": {
            "1": {
                "Name": "Primary Database",
                "Group": "Servers",
                "Host": "${POSTGRES_HOST}",
                "Port": 5432,
                "MaintenanceDB": "${POSTGRES_DB}",
                "Username": "${POSTGRES_USER}",
                "PassFile": "$PGPASSFILE",
                "SSLMode": "prefer"
            }
        }
    }
    EOF

    # Background self-heal loop (see oidc_cleanup.py in this ConfigMap).
    # Disown via setsid so signals to the upstream pgAdmin entrypoint below
    # don't also kill the cleanup; it exits naturally when the pod does.
    setsid python3 /pgadmin4/oidc_cleanup.py &

    exec /entrypoint.sh
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: quicklinks-pgadmin-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quicklinks-pgadmin
  labels:
    app: quicklinks-pgadmin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: quicklinks-pgadmin
  template:
    metadata:
      labels:
        app: quicklinks-pgadmin
    spec:
      securityContext:
        runAsUser: 0
      # pgadmin is an admin tool — runs on the server node (where PVC is bound)
      # No untrusted toleration needed.
      containers:
        - name: pgadmin
          image: dpage/pgadmin4:8
          ports:
            - containerPort: 80
          env:
            - name: POSTGRES_HOST
              value: db
            # PGADMIN_OIDC_SECRET is sourced from the Pulumi-managed Secret
            # `pgadmin-oidc` (created by personal-infrastructure/src/self-hosted/k8s.ts)
            # rather than the app's own Secret. The canonical value lives in
            # Pulumi config `pgadmin:oidcClientSecret` and must match the
            # hashed `client_secret` in Authelia's configuration.yml. Sourcing
            # it from there keeps the rotation surface in one place and
            # avoids the 2026-04-19 bug where the app's Secret held the
            # literal "PLACEHOLDER_WILL_BE_SET_AT_DEPLOY" after a kubectl
            # apply because nothing ever substituted the placeholder.
            - name: PGADMIN_OIDC_SECRET
              valueFrom:
                secretKeyRef:
                  name: pgadmin-oidc
                  key: client-secret
          envFrom:
            - secretRef:
                name: quicklinks-postgres
          command: ["/bin/sh", "/entrypoint_custom.sh"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgadmin
            - name: entrypoint
              mountPath: /entrypoint_custom.sh
              subPath: entrypoint.sh
            - name: entrypoint
              mountPath: /pgadmin4/oidc_cleanup.py
              subPath: oidc_cleanup.py
          resources:
            requests:
              cpu: "20m"
              memory: "64Mi"
            limits:
              memory: "256Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: quicklinks-pgadmin-data
        - name: entrypoint
          configMap:
            name: pgadmin-entrypoint
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: quicklinks-pgadmin
spec:
  type: ClusterIP
  selector:
    app: quicklinks-pgadmin
  ports:
    - port: 80
      targetPort: 80
---
# Tailscale-only ingress — Caddy tailscale-proxy forwards here
# cert-manager DNS-01 via Cloudflare works even for private/TS-only domains
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quicklinks-pgadmin
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - pgadmin.ts.conrad-klaus.de
      secretName: pgadmin-tls
  rules:
    - host: pgadmin.ts.conrad-klaus.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quicklinks-pgadmin
                port:
                  number: 80
