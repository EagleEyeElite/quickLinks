---
# pgAdmin entrypoint script as ConfigMap (creates pgpass + servers.json from env vars)
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgadmin-entrypoint
data:
  entrypoint.sh: |
    #!/bin/sh
    export PGADMIN_CONFIG_SERVER_MODE=True
    export PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=True

    # OAuth2 via Authelia (OIDC). pgAdmin reads PGADMIN_CONFIG_* as Python literals.
    # OAUTH2_CLIENT_SECRET comes from the PGADMIN_OIDC_SECRET env var (set via k8s Secret).
    export PGADMIN_CONFIG_AUTHENTICATION_SOURCES="['oauth2']"
    export PGADMIN_CONFIG_OAUTH2_AUTO_CREATE_USER=True
    export PGADMIN_CONFIG_OAUTH2_CONFIG="[{ \
      'OAUTH2_NAME': 'authelia', \
      'OAUTH2_DISPLAY_NAME': 'Login with Authelia', \
      'OAUTH2_CLIENT_ID': 'pgadmin', \
      'OAUTH2_CLIENT_SECRET': '${PGADMIN_OIDC_SECRET}', \
      'OAUTH2_TOKEN_URL': 'https://auth.ts.conrad-klaus.de/api/oidc/token', \
      'OAUTH2_AUTHORIZATION_URL': 'https://auth.ts.conrad-klaus.de/api/oidc/authorization', \
      'OAUTH2_SERVER_METADATA_URL': 'https://auth.ts.conrad-klaus.de/.well-known/openid-configuration', \
      'OAUTH2_USERINFO_ENDPOINT': 'userinfo', \
      'OAUTH2_SCOPE': 'openid profile email', \
      'OAUTH2_ICON': 'fa-shield', \
      'OAUTH2_BUTTON_COLOR': '#4285F4', \
    }]"

    SERVERS_JSON_PATH="/pgadmin4/servers.json"
    PGPASSFILE="$HOME/.pgpass"

    echo "${POSTGRES_HOST}:*:*:${POSTGRES_USER}:${POSTGRES_PASSWORD}" > "$PGPASSFILE"
    chmod 600 $PGPASSFILE

    cat << EOF > $SERVERS_JSON_PATH
    {
        "Servers": {
            "1": {
                "Name": "Primary Database",
                "Group": "Servers",
                "Host": "${POSTGRES_HOST}",
                "Port": 5432,
                "MaintenanceDB": "${POSTGRES_DB}",
                "Username": "${POSTGRES_USER}",
                "PassFile": "$PGPASSFILE",
                "SSLMode": "prefer"
            }
        }
    }
    EOF

    exec /entrypoint.sh
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: quicklinks-pgadmin-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quicklinks-pgadmin
  labels:
    app: quicklinks-pgadmin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: quicklinks-pgadmin
  template:
    metadata:
      labels:
        app: quicklinks-pgadmin
    spec:
      securityContext:
        runAsUser: 0
      # pgadmin is an admin tool — runs on the server node (where PVC is bound)
      # No untrusted toleration needed.
      containers:
        - name: pgadmin
          image: dpage/pgadmin4:8
          ports:
            - containerPort: 80
          env:
            - name: POSTGRES_HOST
              value: db
          envFrom:
            - secretRef:
                name: quicklinks-postgres
          command: ["/bin/sh", "/entrypoint_custom.sh"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgadmin
            - name: entrypoint
              mountPath: /entrypoint_custom.sh
              subPath: entrypoint.sh
          resources:
            requests:
              cpu: "20m"
              memory: "64Mi"
            limits:
              memory: "256Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: quicklinks-pgadmin-data
        - name: entrypoint
          configMap:
            name: pgadmin-entrypoint
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: quicklinks-pgadmin
spec:
  type: ClusterIP
  selector:
    app: quicklinks-pgadmin
  ports:
    - port: 80
      targetPort: 80
---
# Tailscale-only ingress — Caddy tailscale-proxy forwards here
# cert-manager DNS-01 via Cloudflare works even for private/TS-only domains
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quicklinks-pgadmin
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - pgadmin.ts.conrad-klaus.de
      secretName: pgadmin-tls
  rules:
    - host: pgadmin.ts.conrad-klaus.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quicklinks-pgadmin
                port:
                  number: 80
