---
# init_db.sql as a ConfigMap so postgres can seed an EMPTY database on first
# init (docker-entrypoint-initdb.d). Keep in sync with db/init_db.sql. Rows are
# keyed by sha256(path) so a DB/backup leak can't recover working secret links;
# the app hashes the incoming path before looking it up. redirect_url is TEXT so
# long destinations aren't truncated; label is an optional non-secret admin note.
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init
  labels:
    {{- include "quicklinks.labels" . | nindent 4 }}
data:
  init_db.sql: |
    CREATE TABLE redirects (
        path_hash    CHAR(64) PRIMARY KEY,
        redirect_url TEXT NOT NULL,
        label        VARCHAR(255)
    );

    -- sha256('home') and sha256('test') — sample vanity links (not secret).
    INSERT INTO redirects (path_hash, redirect_url, label) VALUES
      ('4ea140588150773ce3aace786aeef7f4049ce100fa649c94fbbddb960f1da942', 'https://example.com', 'home'),
      ('9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08', 'https://test.com',    'test');
---
# Persistent storage for postgres data. resource-policy:keep so `helm uninstall`
# (or a template removal) never deletes the volume holding every link.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-data
  labels:
    {{- include "quicklinks.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.storage }}
  storageClassName: {{ .Values.postgres.storageClass }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  labels:
    app: db
    {{- include "quicklinks.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate # PVC is RWO; can't have two pods running at once
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      # Runs on the untrusted apps VM alongside the quick-links frontend so the
      # Postgres data volume sits behind the same trust boundary as the pods
      # that read it. The k3s LXC is reserved for privileged workloads.
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: {{ .Values.secret.name }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: db-data
        - name: init
          configMap:
            name: db-init
---
apiVersion: v1
kind: Service
metadata:
  name: db
  labels:
    {{- include "quicklinks.labels" . | nindent 4 }}
spec:
  type: ClusterIP # never exposed via Ingress (private to cluster)
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
