{{- if .Values.pgadmin.enabled }}
---
# pgAdmin entrypoint + self-heal script as ConfigMap.
#
# entrypoint.sh    — creates pgpass + servers.json from env vars, launches
#                    oidc_cleanup.py in the background, then execs the upstream
#                    pgAdmin entrypoint.
#
# oidc_cleanup.py  — makes this instance OIDC-only and keeps every OAuth user's
#                    server tree populated (see the long-form rationale in git
#                    history; behaviour is unchanged from the raw manifest).
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgadmin-entrypoint
  labels:
    {{- include "quicklinks.labels" . | nindent 4 }}
data:
  oidc_cleanup.py: |
    import sqlite3, time, json, os, traceback
    DB_PATH = '/var/lib/pgadmin/pgadmin4.db'
    PG_HOST = os.environ['POSTGRES_HOST']
    PG_DB   = os.environ['POSTGRES_DB']
    PG_USER = os.environ['POSTGRES_USER']
    CONN_PARAMS = json.dumps({'sslmode': 'prefer', 'passfile': '/root/.pgpass'})
    while True:
        try:
            if os.path.exists(DB_PATH):
                c = sqlite3.connect(DB_PATH)
                oauth = c.execute(
                    "SELECT id, email FROM user WHERE auth_source != 'internal'"
                ).fetchall()
                if oauth:
                    internal_ids = [r[0] for r in c.execute(
                        "SELECT id FROM user WHERE auth_source = 'internal'"
                    )]
                    for uid in internal_ids:
                        for tbl in ('server', 'servergroup', 'roles_users'):
                            c.execute(f'DELETE FROM {tbl} WHERE user_id = ?', (uid,))
                        c.execute('DELETE FROM user WHERE id = ?', (uid,))
                    for uid, _email in oauth:
                        if not c.execute(
                            'SELECT 1 FROM servergroup WHERE user_id = ?', (uid,)
                        ).fetchone():
                            c.execute(
                                "INSERT INTO servergroup (user_id, name) "
                                "VALUES (?, 'Servers')", (uid,))
                        if not c.execute(
                            'SELECT 1 FROM server WHERE user_id = ?', (uid,)
                        ).fetchone():
                            sg = c.execute(
                                'SELECT id FROM servergroup WHERE user_id = ?',
                                (uid,)).fetchone()[0]
                            c.execute(
                                'INSERT INTO server (user_id, servergroup_id, '
                                'name, host, port, maintenance_db, username, '
                                'connection_params) VALUES '
                                "(?, ?, 'Primary Database', ?, 5432, ?, ?, ?)",
                                (uid, sg, PG_HOST, PG_DB, PG_USER, CONN_PARAMS))
                    c.commit()
                c.close()
        except Exception:
            traceback.print_exc()
        time.sleep(60)
  entrypoint.sh: |
    #!/bin/sh
    export PGADMIN_CONFIG_SERVER_MODE=True
    export PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=True

    # OAuth2 via Authelia (OIDC). pgAdmin reads PGADMIN_CONFIG_* as Python literals.
    # OAUTH2_CLIENT_SECRET comes from the PGADMIN_OIDC_SECRET env var (set via k8s Secret).
    #
    # OAUTH2_API_BASE_URL is mandatory — pgAdmin's oauth2.py does a plain
    # dict[] lookup on it (not .get()), so omitting it surfaces as a Python
    # KeyError that reaches the login handler as
    # `{"errormsg": "'OAUTH2_API_BASE_URL'"}` and the SSO flow never starts.
    # OAUTH2_USERINFO_ENDPOINT is resolved relative to this base.
    export PGADMIN_CONFIG_AUTHENTICATION_SOURCES="['oauth2']"
    export PGADMIN_CONFIG_OAUTH2_AUTO_CREATE_USER=True
    # Traefik terminates TLS and forwards as HTTP — have Flask honour
    # X-Forwarded-* so the OAuth2 redirect_uri is built with the public
    # https://pgadmin.gated.conrad-klaus.de host instead of the in-cluster one.
    export PGADMIN_CONFIG_PROXY_X_HOST_COUNT=1
    export PGADMIN_CONFIG_PROXY_X_PROTO_COUNT=1
    export PGADMIN_CONFIG_PROXY_X_FOR_COUNT=1
    export PGADMIN_CONFIG_PROXY_X_PORT_COUNT=1
    export PGADMIN_CONFIG_PROXY_X_PREFIX_COUNT=0
    export PGADMIN_CONFIG_OAUTH2_CONFIG="[{ \
      'OAUTH2_NAME': 'authelia', \
      'OAUTH2_DISPLAY_NAME': 'Authelia', \
      'OAUTH2_CLIENT_ID': 'pgadmin', \
      'OAUTH2_CLIENT_SECRET': '${PGADMIN_OIDC_SECRET}', \
      'OAUTH2_TOKEN_URL': 'https://auth.gated.conrad-klaus.de/api/oidc/token', \
      'OAUTH2_AUTHORIZATION_URL': 'https://auth.gated.conrad-klaus.de/api/oidc/authorization', \
      'OAUTH2_API_BASE_URL': 'https://auth.gated.conrad-klaus.de/api/oidc/', \
      'OAUTH2_SERVER_METADATA_URL': 'https://auth.gated.conrad-klaus.de/.well-known/openid-configuration', \
      'OAUTH2_USERINFO_ENDPOINT': 'userinfo', \
      'OAUTH2_SCOPE': 'openid profile email', \
      'OAUTH2_ICON': 'fa-openid', \
      'OAUTH2_BUTTON_COLOR': '#4051b5', \
    }]"

    SERVERS_JSON_PATH="/pgadmin4/servers.json"
    PGPASSFILE="$HOME/.pgpass"

    echo "${POSTGRES_HOST}:*:*:${POSTGRES_USER}:${POSTGRES_PASSWORD}" > "$PGPASSFILE"
    chmod 600 $PGPASSFILE

    cat << EOF > $SERVERS_JSON_PATH
    {
        "Servers": {
            "1": {
                "Name": "Primary Database",
                "Group": "Servers",
                "Host": "${POSTGRES_HOST}",
                "Port": 5432,
                "MaintenanceDB": "${POSTGRES_DB}",
                "Username": "${POSTGRES_USER}",
                "PassFile": "$PGPASSFILE",
                "SSLMode": "prefer"
            }
        }
    }
    EOF

    # Background self-heal loop (see oidc_cleanup.py in this ConfigMap).
    # Disown via setsid so signals to the upstream pgAdmin entrypoint below
    # don't also kill the cleanup; it exits naturally when the pod does.
    setsid python3 /pgadmin4/oidc_cleanup.py &

    exec /entrypoint.sh
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: quicklinks-pgadmin-data
  labels:
    {{- include "quicklinks.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.pgadmin.storage }}
  storageClassName: {{ .Values.pgadmin.storageClass }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quicklinks-pgadmin
  labels:
    app: quicklinks-pgadmin
    {{- include "quicklinks.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: quicklinks-pgadmin
  template:
    metadata:
      labels:
        app: quicklinks-pgadmin
    spec:
      securityContext:
        runAsUser: 0
      # pgadmin is an admin tool — runs on the server node (where PVC is bound).
      # No untrusted toleration needed.
      containers:
        - name: pgadmin
          image: {{ .Values.pgadmin.image }}
          ports:
            - containerPort: 80
          env:
            - name: POSTGRES_HOST
              value: db
            # PGADMIN_OIDC_SECRET is sourced from the Pulumi-managed Secret
            # (personal-infrastructure) rather than the app's own Secret, so the
            # rotation surface stays in one place.
            - name: PGADMIN_OIDC_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pgadmin.oidcSecretName }}
                  key: {{ .Values.pgadmin.oidcSecretKey }}
          envFrom:
            - secretRef:
                name: {{ .Values.secret.name }}
          command: ["/bin/sh", "/entrypoint_custom.sh"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgadmin
            - name: entrypoint
              mountPath: /entrypoint_custom.sh
              subPath: entrypoint.sh
            - name: entrypoint
              mountPath: /pgadmin4/oidc_cleanup.py
              subPath: oidc_cleanup.py
          resources:
            {{- toYaml .Values.pgadmin.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: quicklinks-pgadmin-data
        - name: entrypoint
          configMap:
            name: pgadmin-entrypoint
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: quicklinks-pgadmin
  labels:
    {{- include "quicklinks.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: quicklinks-pgadmin
  ports:
    - port: 80
      targetPort: 80
---
# Tailscale-only ingress — pgAdmin is a DB admin tool that must never be
# reachable from the public internet. cert-manager DNS-01 via Cloudflare works
# even for private/TS-only domains.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quicklinks-pgadmin
  labels:
    {{- include "quicklinks.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer }}
    traefik.ingress.kubernetes.io/router.entrypoints: {{ .Values.pgadmin.entryPoint | quote }}
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - {{ .Values.pgadmin.host }}
      secretName: {{ .Values.pgadmin.tlsSecret }}
  rules:
    - host: {{ .Values.pgadmin.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quicklinks-pgadmin
                port:
                  number: 80
{{- end }}
